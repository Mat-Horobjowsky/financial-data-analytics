segment_rollups:
  - []
  - [region]
  - [provider]
  - [region, provider]

metrics:
  - id: total_revenue
    label: Total Revenue
    type: sum
    unit: USD
    decimals: 0
    description: Sum of all revenue across selected period
    source_col: revenue

  - id: capacity_mw
    label: Total Capacity (MW)
    type: sum
    unit: MW
    decimals: 1
    description: Sum of installed capacity in megawatts
    source_col: capacity_mw

  - id: leased_mw
    label: Total Leased (MW)
    type: sum
    unit: MW
    decimals: 1
    description: Sum of leased megawatts
    source_col: leased_mw

  - id: contracted_kw
    label: Total Contracted (KW)
    type: sum
    unit: KW
    decimals: 0
    description: Sum of contracted kilowatts
    source_col: contracted_kw

  - id: utilization_pct
    label: Utilization Rate
    type: ratio
    unit: "%"
    decimals: 1
    description: Percentage of capacity that is leased (leased_mw / capacity_mw * 100)
    numerator: leased_mw
    denominator: capacity_mw
    scale: 100

  - id: avg_price_per_kw
    label: Average Price per KW
    type: per_unit
    unit: USD/KW
    decimals: 2
    description: Revenue divided by contracted kilowatts
    numerator: revenue
    denominator: contracted_kw
